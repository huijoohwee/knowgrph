<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700" role="img" aria-label="Demo placeholder image">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="0.5" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0b1020" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="700" fill="url(#g)"/>
  <rect x="90" y="120" width="1020" height="460" rx="28" fill="#0b1020" fill-opacity="0.35" filter="url(#s)"/>
  <g fill="#ffffff" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">
    <text x="600" y="320" font-size="44" font-weight="700" text-anchor="middle">Demo Image</text>
    <text x="600" y="375" font-size="18" fill-opacity="0.9" text-anchor="middle">Local placeholder (avoids remote image ORB)</text>
    <text x="600" y="440" font-size="14" fill-opacity="0.8" text-anchor="middle">/demo/placeholder.svg</text>
  </g>
</svg>
