name: Production Release

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Exact 40-character Dev commit SHA already verified by Integration Gate
        required: true
        type: string
      confirmation:
        description: Type DEPLOY to authorize the production release
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: production-release
  cancel-in-progress: false

jobs:
  verify:
    name: Verify Release Candidate
    runs-on: ubuntu-latest
    outputs:
      docs_repository: ${{ steps.agentic_canvas_os_docs.outputs.repository }}
      docs_revision: ${{ steps.agentic_canvas_os_docs.outputs.ref }}
      manifest_digest: ${{ steps.immutable_manifest.outputs.digest }}
    env:
      RELEASE_SHA: ${{ inputs.commit_sha }}
      RELEASE_CONFIRMATION: ${{ inputs.confirmation }}
      KNOWGRPH_AGENTIC_CANVAS_OS_DOCS_ROOT: ${{ github.workspace }}/agentic-canvas-os/docs

    steps:
      - name: Validate explicit authorization
        run: |
          if [[ ! "$RELEASE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "commit_sha must be an exact lowercase 40-character Git commit SHA" >&2
            exit 1
          fi
          if [ "$RELEASE_CONFIRMATION" != "DEPLOY" ]; then
            echo "production release requires confirmation=DEPLOY" >&2
            exit 1
          fi

      - name: Checkout exact Dev commit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha }}
          path: knowgrph
          fetch-depth: 2

      - name: Verify checked-out commit
        working-directory: knowgrph
        run: test "$(git rev-parse HEAD)" = "$RELEASE_SHA"

      - name: Checkout production mirror
        uses: actions/checkout@v4
        with:
          repository: huijoohwee/huijoohwee
          path: huijoohwee

      - name: Checkout schema mirror
        uses: actions/checkout@v4
        with:
          repository: huijoohwee/huijoohwee.github.io
          path: huijoohwee.github.io

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            knowgrph/package-lock.json
            knowgrph/canvas/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: knowgrph
        run: npm ci

      - name: Resolve Agentic Canvas OS docs dependency
        id: agentic_canvas_os_docs
        working-directory: knowgrph
        run: npm run --silent runtime:docs-dependency:resolve -- --github-output >> "$GITHUB_OUTPUT"

      - name: Checkout Agentic Canvas OS docs SSOT
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.agentic_canvas_os_docs.outputs.repository }}
          ref: ${{ steps.agentic_canvas_os_docs.outputs.ref }}
          path: agentic-canvas-os

      - name: Create immutable release manifest
        id: immutable_manifest
        working-directory: knowgrph
        run: npm run --silent release:manifest:create -- --source-sha "$RELEASE_SHA" --target-ref "refs/heads/main" --output "$RUNNER_TEMP/immutable-release-manifest.json" --github-output

      - name: Validate checked-out Agentic Canvas OS revision
        working-directory: knowgrph
        run: test "$(git -C ../agentic-canvas-os rev-parse HEAD)" = "${{ steps.agentic_canvas_os_docs.outputs.ref }}"

      - name: Validate immutable release manifest
        working-directory: knowgrph
        run: npm run --silent release:manifest:check -- "$RUNNER_TEMP/immutable-release-manifest.json" --source-sha "$RELEASE_SHA" --docs-sha "${{ steps.agentic_canvas_os_docs.outputs.ref }}" --digest "${{ steps.immutable_manifest.outputs.digest }}"

      - name: Upload immutable release manifest
        uses: actions/upload-artifact@v4
        with:
          name: immutable-release-manifest-${{ inputs.commit_sha }}
          path: ${{ runner.temp }}/immutable-release-manifest.json
          if-no-files-found: error
          retention-days: 7

      - name: Reverify exact candidate
        working-directory: knowgrph
        run: npm run ci:integration

      - name: Build and sync verified candidate into ephemeral production artifact
        working-directory: knowgrph
        env:
          KNOWGRPH_SOURCE_REVISION: ${{ inputs.commit_sha }}
        run: npm run pages:build-sync

      - name: Verify source-to-mirror parity
        working-directory: knowgrph
        run: npm run conflict:mirror:check

      - name: Build Pages functions
        working-directory: knowgrph
        run: npm run pages:functions:build

      - name: Upload verified release artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-${{ inputs.commit_sha }}
          path: |
            huijoohwee/content/knowgrph
            huijoohwee/functions
            huijoohwee/canvas
            huijoohwee/contracts
            huijoohwee/grph-shared
            huijoohwee/_worker.js
            huijoohwee/_routes.json
            huijoohwee/_headers
            huijoohwee/_redirects
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy Production
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      KNOWGRPH_AGENTIC_CANVAS_OS_DOCS_ROOT: ${{ github.workspace }}/agentic-canvas-os/docs

    steps:
      - name: Checkout exact Dev commit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha }}
          path: knowgrph
          fetch-depth: 1

      - name: Checkout production mirror
        uses: actions/checkout@v4
        with:
          repository: huijoohwee/huijoohwee
          path: huijoohwee

      - name: Checkout exact Agentic Canvas OS docs SSOT
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.verify.outputs.docs_repository }}
          ref: ${{ needs.verify.outputs.docs_revision }}
          path: agentic-canvas-os

      - name: Validate checked-out Agentic Canvas OS revision
        run: test "$(git -C agentic-canvas-os rev-parse HEAD)" = "${{ needs.verify.outputs.docs_revision }}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            knowgrph/package-lock.json
            knowgrph/canvas/package-lock.json

      - name: Install dependencies
        working-directory: knowgrph
        run: npm ci

      - name: Download verified release artifact
        uses: actions/download-artifact@v4
        with:
          name: production-${{ inputs.commit_sha }}
          path: huijoohwee

      - name: Download immutable release manifest
        uses: actions/download-artifact@v4
        with:
          name: immutable-release-manifest-${{ inputs.commit_sha }}
          path: ${{ runner.temp }}/immutable-release-manifest-proof

      - name: Revalidate immutable release manifest
        working-directory: knowgrph
        run: npm run --silent release:manifest:check -- "$RUNNER_TEMP/immutable-release-manifest-proof/immutable-release-manifest.json" --source-sha "${{ inputs.commit_sha }}" --docs-sha "${{ needs.verify.outputs.docs_revision }}" --digest "${{ needs.verify.outputs.manifest_digest }}"

      - name: Require configured deployment credentials
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"

      - name: Deploy verified artifact
        working-directory: knowgrph
        run: npx --no-install wrangler pages deploy ../huijoohwee --project-name=joohwee --branch=main --commit-dirty=true

      - name: Reconcile canonical docs into D1
        working-directory: knowgrph
        run: npm run storage:d1:seed:docs

      - name: Verify live agent-ready discovery
        working-directory: knowgrph
        run: ./.github/workflows/smoke-test.sh
