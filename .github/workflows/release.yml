name: Production Release

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: production-release
  cancel-in-progress: false

jobs:
  verify:
    name: Verify Release Candidate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      docs_repository: ${{ steps.agentic_canvas_os_docs.outputs.repository }}
      docs_revision: ${{ steps.agentic_canvas_os_docs.outputs.ref }}
      manifest_digest: ${{ steps.immutable_manifest.outputs.digest }}
      mirror_revision: ${{ steps.mirror_revision.outputs.revision }}
    env:
      RELEASE_SHA: ${{ github.sha }}
      KNOWGRPH_AGENTIC_CANVAS_OS_DOCS_ROOT: ${{ github.workspace }}/agentic-canvas-os/docs

    steps:
      - name: Checkout exact protected main commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ github.sha }}
          path: knowgrph
          fetch-depth: 2

      - name: Verify checked-out commit
        working-directory: knowgrph
        run: |
          test "$GITHUB_REF" = "refs/heads/main"
          test "$(git rev-parse HEAD)" = "$RELEASE_SHA"

      - name: Checkout production mirror
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: huijoohwee/huijoohwee
          path: huijoohwee

      - name: Capture production mirror base revision
        id: mirror_revision
        working-directory: huijoohwee
        run: echo "revision=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Checkout schema mirror
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: huijoohwee/huijoohwee.github.io
          path: huijoohwee.github.io

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            knowgrph/package-lock.json
            knowgrph/canvas/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: knowgrph
        run: |
          for attempt in 1 2 3; do
            if npm ci; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "npm ci failed after $attempt attempts" >&2
              exit 1
            fi
            sleep "$((attempt * 10))"
          done

      - name: Resolve Agentic Canvas OS docs dependency
        id: agentic_canvas_os_docs
        working-directory: knowgrph
        run: npm run --silent runtime:docs-dependency:resolve -- --github-output >> "$GITHUB_OUTPUT"

      - name: Checkout Agentic Canvas OS docs SSOT
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: ${{ steps.agentic_canvas_os_docs.outputs.repository }}
          ref: ${{ steps.agentic_canvas_os_docs.outputs.ref }}
          path: agentic-canvas-os
          fetch-depth: 0

      - name: Create immutable release manifest
        id: immutable_manifest
        working-directory: knowgrph
        run: npm run --silent release:manifest:create -- --source-sha "$RELEASE_SHA" --target-ref "refs/heads/main" --output "$RUNNER_TEMP/immutable-release-manifest.json" --github-output

      - name: Validate dependency and immutable manifest
        working-directory: knowgrph
        run: |
          test "$(git -C ../agentic-canvas-os rev-parse HEAD)" = "${{ steps.agentic_canvas_os_docs.outputs.ref }}"
          npm run --silent release:manifest:check -- "$RUNNER_TEMP/immutable-release-manifest.json" --source-sha "$RELEASE_SHA" --docs-sha "${{ steps.agentic_canvas_os_docs.outputs.ref }}" --digest "${{ steps.immutable_manifest.outputs.digest }}"

      - name: Upload immutable release manifest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: immutable-release-manifest-${{ github.sha }}
          path: ${{ runner.temp }}/immutable-release-manifest.json
          if-no-files-found: error
          retention-days: 30

      - name: Reverify exact candidate
        working-directory: knowgrph
        run: npm run ci:integration

      - name: Build and sync verified candidate
        working-directory: knowgrph
        env:
          KNOWGRPH_SOURCE_REVISION: ${{ github.sha }}
          VITE_KNOWGRPH_STORAGE_BASE_URL: https://airvio.co
        run: npm run pages:build-sync

      - name: Verify source-to-mirror parity
        working-directory: knowgrph
        run: npm run conflict:mirror:check

      - name: Build Pages functions
        working-directory: knowgrph
        run: npm run pages:functions:build

      - name: Create verified mirror artifact manifest
        working-directory: knowgrph
        run: npm run --silent production:mirror-artifact:create -- ../huijoohwee

      - name: Upload verified release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: production-${{ github.sha }}
          path: |
            huijoohwee/404.html
            huijoohwee/content/knowgrph
            huijoohwee/knowgrph
            huijoohwee/functions
            huijoohwee/canvas
            huijoohwee/contracts
            huijoohwee/grph-shared
            huijoohwee/_worker.js
            huijoohwee/_routes.json
            huijoohwee/_headers
            huijoohwee/_redirects
            huijoohwee/.well-known/runtime-readiness.json
            huijoohwee/.knowgrph-production-artifact-manifest.json
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 30

  deploy:
    name: Deploy, Verify, And Publish Mirror
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
      KNOWGRPH_AGENTIC_CANVAS_OS_DOCS_ROOT: ${{ github.workspace }}/agentic-canvas-os/docs
      RELEASE_SHA: ${{ github.sha }}

    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ github.sha }}
          path: knowgrph
          fetch-depth: 1

      - name: Checkout production mirror
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: huijoohwee/huijoohwee
          ref: ${{ needs.verify.outputs.mirror_revision }}
          path: huijoohwee
          token: ${{ secrets.HUIJOOHWEE_PUSH_TOKEN }}

      - name: Checkout exact Agentic Canvas OS docs SSOT
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: ${{ needs.verify.outputs.docs_repository }}
          ref: ${{ needs.verify.outputs.docs_revision }}
          path: agentic-canvas-os

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            knowgrph/package-lock.json
            knowgrph/canvas/package-lock.json

      - name: Install dependencies
        working-directory: knowgrph
        run: |
          for attempt in 1 2 3; do
            if npm ci; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "npm ci failed after $attempt attempts" >&2
              exit 1
            fi
            sleep "$((attempt * 10))"
          done

      - name: Download verified artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: production-${{ github.sha }}
          path: ${{ runner.temp }}/production-mirror-artifact

      - name: Reconcile verified artifact into exact mirror base
        working-directory: knowgrph
        run: npm run --silent production:mirror-artifact:reconcile -- "$RUNNER_TEMP/production-mirror-artifact" "$GITHUB_WORKSPACE/huijoohwee"

      - name: Download immutable manifest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: immutable-release-manifest-${{ github.sha }}
          path: ${{ runner.temp }}/immutable-release-manifest-proof

      - name: Revalidate immutable manifest and configuration
        working-directory: knowgrph
        run: |
          test "$(git -C ../agentic-canvas-os rev-parse HEAD)" = "${{ needs.verify.outputs.docs_revision }}"
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_PAGES_PROJECT"
          test -n "${{ secrets.HUIJOOHWEE_PUSH_TOKEN }}"
          npm run --silent release:manifest:check -- "$RUNNER_TEMP/immutable-release-manifest-proof/immutable-release-manifest.json" --source-sha "${{ github.sha }}" --docs-sha "${{ needs.verify.outputs.docs_revision }}" --digest "${{ needs.verify.outputs.manifest_digest }}"

      - name: Enforce sole deployment ownership
        working-directory: knowgrph
        run: |
          npm run --silent release:main-authority:check -- --source-sha "$RELEASE_SHA"
          npm run --silent runtime:pages:owner-enforce

      - name: Capture current production rollback target
        id: previous
        working-directory: knowgrph
        run: npm run --silent runtime:pages:capture-current

      - name: Prewarm returning-user service worker profile
        working-directory: knowgrph
        env:
          PRODUCTION_SW_PROFILE_ORIGIN: ${{ steps.previous.outputs.production_origin }}
          PRODUCTION_SW_PROFILE_DIR: ${{ runner.temp }}/knowgrph-production-sw-profile
          PRODUCTION_SW_EVIDENCE_PATH: ${{ runner.temp }}/knowgrph-production-sw-evidence.json
          PRODUCTION_BROWSER_HEADLESS: 'false'
        run: xvfb-run --auto-servernum npm run production:sw-upgrade:prewarm

      - name: Deploy verified artifact
        id: deploy_pages
        working-directory: knowgrph
        run: |
          npm run --silent release:main-authority:check -- --source-sha "$RELEASE_SHA"
          npx --no-install wrangler pages deploy ../huijoohwee --project-name="$CLOUDFLARE_PAGES_PROJECT" --branch=main --commit-hash="$RELEASE_SHA" --commit-dirty=true

      - name: Capture exact candidate deployment origin
        id: candidate
        working-directory: knowgrph
        run: npm run --silent runtime:pages:capture-candidate -- --commit-sha "$RELEASE_SHA"

      - name: Reconcile canonical docs into D1
        working-directory: knowgrph
        run: |
          npm run --silent release:main-authority:check -- --source-sha "$RELEASE_SHA"
          npm run storage:d1:seed:docs

      - name: Verify live runtime
        working-directory: knowgrph
        run: ./.github/workflows/smoke-test.sh

      - name: Verify exact deployment markers and candidate browser fidelity
        working-directory: knowgrph
        env:
          PRODUCTION_ORIGIN: ${{ steps.candidate.outputs.deployment_url }}
          PRODUCTION_MARKER_ORIGIN: ${{ steps.candidate.outputs.deployment_url }}
          PRODUCTION_IMMUTABLE_MANIFEST_DIGEST: ${{ needs.verify.outputs.manifest_digest }}
          PRODUCTION_BROWSER_HEADLESS: 'false'
        run: |
          for attempt in 1 2 3; do
            if xvfb-run --auto-servernum npm run production:fidelity:check; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep 15
          done

      - name: Verify returning-user service worker revision convergence
        working-directory: knowgrph
        env:
          PRODUCTION_SW_PROFILE_ORIGIN: ${{ steps.previous.outputs.production_origin }}
          PRODUCTION_SW_PROFILE_DIR: ${{ runner.temp }}/knowgrph-production-sw-profile
          PRODUCTION_SW_EVIDENCE_PATH: ${{ runner.temp }}/knowgrph-production-sw-evidence.json
          PRODUCTION_BROWSER_HEADLESS: 'false'
        run: xvfb-run --auto-servernum npm run production:sw-upgrade:verify

      - name: Publish verified production mirror
        working-directory: huijoohwee
        run: |
          git config user.name "knowgrph-release[bot]"
          git config user.email "knowgrph-release[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Production mirror already represents $RELEASE_SHA."
          else
            git commit -m "chore(release): promote knowgrph ${RELEASE_SHA:0:12}"
            npm --prefix ../knowgrph run --silent release:main-authority:check -- --source-sha "$RELEASE_SHA"
            git push origin HEAD:main
          fi

      - name: Checkout rollback Knowgrph source
        if: failure() && steps.deploy_pages.outcome == 'success'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ steps.previous.outputs.commit_sha }}
          path: rollback-knowgrph

      - name: Install rollback dependencies
        if: failure() && steps.deploy_pages.outcome == 'success'
        working-directory: rollback-knowgrph
        run: npm ci

      - name: Resolve rollback docs dependency
        if: failure() && steps.deploy_pages.outcome == 'success'
        id: rollback_docs
        working-directory: rollback-knowgrph
        run: npm run --silent runtime:docs-dependency:resolve -- --github-output >> "$GITHUB_OUTPUT"

      - name: Checkout rollback Agentic Canvas OS docs
        if: failure() && steps.deploy_pages.outcome == 'success'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: ${{ steps.rollback_docs.outputs.repository }}
          ref: ${{ steps.rollback_docs.outputs.ref }}
          path: rollback-agentic-canvas-os

      - name: Roll back Pages and canonical docs
        if: failure() && steps.deploy_pages.outcome == 'success'
        working-directory: rollback-knowgrph
        env:
          KNOWGRPH_AGENTIC_CANVAS_OS_DOCS_ROOT: ${{ github.workspace }}/rollback-agentic-canvas-os/docs
        run: |
          npm run --silent runtime:pages:rollback -- --deployment-id "${{ steps.previous.outputs.deployment_id }}"
          npm run storage:d1:seed:docs

      - name: Verify restored production runtime
        if: failure() && steps.deploy_pages.outcome == 'success'
        working-directory: rollback-knowgrph
        run: ./.github/workflows/smoke-test.sh
