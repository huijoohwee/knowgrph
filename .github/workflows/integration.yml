name: Integration

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review]
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: integration-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  integration-gate:
    name: Integration Gate
    runs-on: ubuntu-latest
    env:
      KNOWGRPH_PR_BODY: ${{ github.event.pull_request.body || '' }}
      KNOWGRPH_PR_BASE_REF: ${{ github.event.pull_request.base.ref || '' }}
      KNOWGRPH_PR_DRAFT: ${{ github.event.pull_request.draft || false }}
      KNOWGRPH_PR_HEAD_REF: ${{ github.event.pull_request.head.ref || '' }}
      KNOWGRPH_PR_NUMBER: ${{ github.event.pull_request.number || '' }}
      KNOWGRPH_REPOSITORY: ${{ github.repository }}
      KNOWGRPH_SOURCE_REVISION: ${{ github.event.pull_request.head.sha || github.sha }}
      KNOWGRPH_TARGET_REF: refs/heads/${{ github.event.pull_request.head.ref || github.ref_name }}
      KNOWGRPH_AGENTIC_CANVAS_OS_DOCS_ROOT: ${{ github.workspace }}/agentic-canvas-os/docs

    steps:
      - name: Checkout knowgrph
        uses: actions/checkout@v4
        with:
          path: knowgrph
          fetch-depth: 0

      - name: Checkout publish mirror for drift verification
        uses: actions/checkout@v4
        with:
          repository: huijoohwee/huijoohwee
          ref: main
          path: huijoohwee

      - name: Checkout schema mirror for drift verification
        uses: actions/checkout@v4
        with:
          repository: huijoohwee/huijoohwee.github.io
          ref: main
          path: huijoohwee.github.io

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            knowgrph/package-lock.json
            knowgrph/canvas/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: knowgrph
        run: npm ci

      - name: Resolve Agentic Canvas OS docs dependency
        id: agentic_canvas_os_docs
        working-directory: knowgrph
        run: npm run --silent runtime:docs-dependency:resolve -- --github-output >> "$GITHUB_OUTPUT"

      - name: Checkout Agentic Canvas OS docs SSOT
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.agentic_canvas_os_docs.outputs.repository }}
          ref: ${{ steps.agentic_canvas_os_docs.outputs.ref }}
          path: agentic-canvas-os

      - name: Create immutable app docs catalog manifest
        id: immutable_manifest
        working-directory: knowgrph
        run: npm run --silent release:manifest:create -- --source-sha "$KNOWGRPH_SOURCE_REVISION" --target-ref "$KNOWGRPH_TARGET_REF" --output "$RUNNER_TEMP/immutable-release-manifest.json" --github-output

      - name: Validate checked-out Agentic Canvas OS revision
        working-directory: knowgrph
        run: test "$(git -C ../agentic-canvas-os rev-parse HEAD)" = "${{ steps.agentic_canvas_os_docs.outputs.ref }}"

      - name: Upload immutable release manifest
        uses: actions/upload-artifact@v7
        with:
          name: immutable-release-manifest
          path: ${{ runner.temp }}/immutable-release-manifest.json
          if-no-files-found: error
          retention-days: 7

      - name: Download immutable release manifest proof
        uses: actions/download-artifact@v8
        with:
          name: immutable-release-manifest
          path: ${{ runner.temp }}/immutable-release-manifest-proof

      - name: Validate immutable release manifest proof
        working-directory: knowgrph
        run: npm run --silent release:manifest:check -- "$RUNNER_TEMP/immutable-release-manifest-proof/immutable-release-manifest.json" --source-sha "$KNOWGRPH_SOURCE_REVISION" --docs-sha "${{ steps.agentic_canvas_os_docs.outputs.ref }}" --digest "${{ steps.immutable_manifest.outputs.digest }}"

      - name: Validate cross-device scope ownership
        working-directory: knowgrph
        env:
          KNOWGRPH_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KNOWGRPH_REQUIRE_REMOTE_SCOPE_CHECK: true
        run: npm run --silent collaboration:contract:check -- --json > collaboration-contract-report.json

      - name: Upload collaboration contract report
        uses: actions/upload-artifact@v7
        with:
          name: collaboration-contract-report
          path: knowgrph/collaboration-contract-report.json
          if-no-files-found: error
          retention-days: 7

      - name: Download collaboration contract report proof
        uses: actions/download-artifact@v8
        with:
          name: collaboration-contract-report
          path: knowgrph/collaboration-contract-report-proof

      - name: Validate downloaded collaboration contract report
        working-directory: knowgrph
        run: npm run --silent collaboration:report:check -- --json collaboration-contract-report-proof/collaboration-contract-report.json > collaboration-validation-result.json

      - name: Upload collaboration validation result
        uses: actions/upload-artifact@v7
        with:
          name: collaboration-validation-result
          path: knowgrph/collaboration-validation-result.json
          if-no-files-found: error
          retention-days: 7

      - name: Download collaboration validation result proof
        uses: actions/download-artifact@v8
        with:
          name: collaboration-validation-result
          path: knowgrph/collaboration-validation-result-proof

      - name: Validate downloaded collaboration validation result
        working-directory: knowgrph
        run: npm run --silent collaboration:report:check-result -- collaboration-validation-result-proof/collaboration-validation-result.json --report collaboration-contract-report-proof/collaboration-contract-report.json --source-revision "$KNOWGRPH_SOURCE_REVISION"

      - name: Run canonical integration gate
        working-directory: knowgrph
        env:
          KNOWGRPH_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run ci:integration
