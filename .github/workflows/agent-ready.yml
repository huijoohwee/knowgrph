name: Agent Ready

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  agent-ready:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout knowgrph
        uses: actions/checkout@v4
        with:
          path: knowgrph

      - name: Checkout huijoohwee publish mirror
        uses: actions/checkout@v4
        with:
          repository: huijoohwee/huijoohwee
          path: huijoohwee

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            knowgrph/package-lock.json
            knowgrph/canvas/package-lock.json

      - name: Install dependencies
        working-directory: knowgrph
        run: npm ci

      - name: Build and sync Pages artifacts
        working-directory: knowgrph
        run: npm run pages:build-sync

      - name: Check publish sync
        working-directory: knowgrph
        run: npm run pages:check-sync

      - name: Deploy Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        working-directory: knowgrph
        run: npm run pages:functions:build && npx --yes wrangler@4.110.0 pages deploy ../huijoohwee --project-name=joohwee --branch=main --commit-dirty=true

      - name: Smoke live agent-ready discovery
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        working-directory: knowgrph
        run: ./.github/workflows/smoke-test.sh
