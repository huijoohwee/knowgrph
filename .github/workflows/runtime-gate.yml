# Runtime Verification — proves local readiness first, then optionally verifies
# explicitly supplied deployed endpoints without deploying or mutating state.
#
# Design principles honored:
#   * No hardcoded URLs/secrets — every endpoint is read from a workflow input,
#     repo/environment Variable, or Secret, so the gate is neutral and reusable
#     across environments. Nothing project-specific is baked in.
#   * No duplicated logic — npm scripts own local proof and deployed probes.
#   * Fail closed — deployed verification requires both explicit endpoints.
#
# Trigger:
#   * workflow_dispatch — explicit manual run with optional endpoint inputs.

name: Runtime Verification

on:
  workflow_dispatch:
    inputs:
      mcp_endpoint:
        description: "Cloudflare MCP endpoint (overrides the MCP_ENDPOINT variable)"
        required: false
        default: ""
      frontend_url:
        description: "Frontend URL (overrides the FRONTEND_URL variable)"
        required: false
        default: ""
      storage_worker_url:
        description: "Optional storage Worker URL"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: runtime-verification
  cancel-in-progress: true

# Endpoints resolve with precedence: dispatch input > repo/env Variable. They
# stay empty when unset so the verify step can skip cleanly (no hardcode).
env:
  MCP_ENDPOINT: ${{ github.event.inputs.mcp_endpoint || vars.MCP_ENDPOINT }}
  FRONTEND_URL: ${{ github.event.inputs.frontend_url || vars.FRONTEND_URL }}
  STORAGE_WORKER_URL: ${{ github.event.inputs.storage_worker_url || vars.STORAGE_WORKER_URL }}
  KNOWGRPH_AGENTIC_CANVAS_OS_DOCS_ROOT: ${{ github.workspace }}/agentic-canvas-os/docs

jobs:
  runtime-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout Agentic Canvas OS docs SSOT
        uses: actions/checkout@v4
        with:
          repository: huijoohwee/agentic-canvas-os
          ref: 9a37243c794e6bd4a86d0d58b1d9dc23e1541673
          path: agentic-canvas-os

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # Deterministic network-free gate — must pass before reachability checks.
      - name: Runtime readiness check (network-free)
        run: npm run runtime:check

      # Active only once at least one endpoint is configured (input or Variable),
      # so the gate is inert before credentials are wired and self-activates after.
      - name: Resolve verify activation
        id: verify
        run: |
          if [ -n "$FRONTEND_URL" ] && [ -n "$MCP_ENDPOINT" ]; then
            echo "active=true" >> "$GITHUB_OUTPUT"
          else
            echo "active=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Deployed verification skipped — both FRONTEND_URL and MCP_ENDPOINT are required."
          fi

      - name: Runtime verify (deployed reachability — AC-7)
        if: steps.verify.outputs.active == 'true'
        run: npm run runtime:verify:deployed
