name: Conflict Compliance

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  conflict-compliance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout knowgrph
        uses: actions/checkout@v4
        with:
          path: knowgrph

      - name: Checkout huijoohwee publish mirror
        uses: actions/checkout@v4
        with:
          repository: huijoohwee/huijoohwee
          path: huijoohwee

      - name: Checkout huijoohwee.github.io schema mirror
        uses: actions/checkout@v4
        with:
          repository: huijoohwee/huijoohwee.github.io
          path: huijoohwee.github.io

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            knowgrph/package-lock.json
            knowgrph/canvas/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: knowgrph
        run: npm ci

      - name: Run conflict compliance checks
        working-directory: knowgrph
        run: npm run conflict:check
