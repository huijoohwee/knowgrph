# Cloudflare Worker: knowgrph-mcp
#
# Hosts the Agents SDK `McpAgent` exposing MCP Streamable HTTP transport at
# airvio.co/knowgrph/control-plane/mcp (see knowgrph-acos-mcp-connector spec, ADR-7).
#
# Route note: this Worker now owns a dedicated control-plane endpoint so the
# published Pages agent-ready surface can continue serving `/knowgrph/mcp`
# without route shadowing. Keep the Pages route for public discovery/read-only
# MCP and reserve this Worker for the Streamable HTTP Director control plane.

name = "knowgrph-mcp"
main = "index.ts"
compatibility_date = "2026-07-13"
compatibility_flags = [ "nodejs_compat" ]

[observability]
enabled = true

[vars]
KNOWGRPH_MCP_PUBLIC_BASE_URL = "https://airvio.co"
KNOWGRPH_MCP_TOOL_LIST_NAME = "knowgrph-video-remix"
# Live SME Care execution also requires an operator-selected model identifier.
# Keep it out of the repository default and configure KNOWGRPH_AGENT_MODEL_ID
# in the target Worker environment before requesting bounded live proof.
# Required before serving authenticated MCP, agent-run POST, or persisted-run reads:
#   npx wrangler secret put KNOWGRPH_AGENT_RUNTIME_BEARER_TOKEN --config cloudflare/workers/knowgrph-mcp/wrangler.toml
# task 12.5 — env-gated live/mock stage clients. Default "0" keeps the Director
# on deterministic mocks (zero live/paid calls). Flip to "1" to enable live
# clients, or provide a provider credential as a SECRET (not a var):
#   npx wrangler secret put EXA_API_KEY --config cloudflare/workers/knowgrph-mcp/wrangler.toml
# When EXA_API_KEY is present the Exa client uses api-key-header mode; with only
# KNOWGRPH_LIVE_CLIENTS="1" it uses Exa hosted-free mode. EXA_MCP_ENDPOINT is
# optional (defaults to https://mcp.exa.ai/mcp).
KNOWGRPH_LIVE_CLIENTS = "0"
# task 12.4 live stage clients (optional; set the endpoint + provide the key as
# a SECRET via `wrangler secret put <NAME>`). Absent → that stage uses its mock.
#   Storyboard (USABLE NOW): AI_GATEWAY_CHAT_URL + BYTEPLUS_API_KEY (or AI_GATEWAY_TOKEN),
#     optional BYTEPLUS_CHAT_MODEL (default "skylark-chat").
#   Render: AI_GATEWAY_VIDEO_URL + BYTEPLUS_API_KEY (default) or RENDER_PROVIDER=strytree + STRYTREE_RENDER_URL + STRYTREE_API_KEY.
#   Commerce: KNOWGRPH_PAYMENT_URL + KNOWGRPH_PAYMENT_API_KEY.

# Streamable HTTP transport endpoint per Requirement R14.1.
[ai]
binding = "AI"

[[routes]]
pattern = "airvio.co/knowgrph/control-plane/mcp"
zone_name = "airvio.co"

[[routes]]
pattern = "airvio.co/knowgrph/control-plane/mcp/*"
zone_name = "airvio.co"

[[routes]]
pattern = "airvio.co/knowgrph/control-plane/agents"
zone_name = "airvio.co"

[[routes]]
pattern = "airvio.co/knowgrph/control-plane/agents/*"
zone_name = "airvio.co"

# McpAgent maintains per-session state in a Durable Object. Task 1.2 adds a
# separate `RunManifestStore` DO that persists each Director Run_Manifest
# under one DO instance per `runId`, so a `GET /knowgrph/control-plane/mcp/runs/{id}`
# read-back returns the latest persisted state with read-after-write
# consistency (R14.2 / Property 25).
[[durable_objects.bindings]]
name = "MCP_AGENT"
class_name = "KnowgrphMcpAgent"

[[durable_objects.bindings]]
name = "RUN_MANIFEST_STORE"
class_name = "RunManifestStore"

[[migrations]]
tag = "v1_knowgrph_mcp_agent"
new_sqlite_classes = [ "KnowgrphMcpAgent" ]

[[migrations]]
tag = "v2_run_manifest_store"
new_sqlite_classes = [ "RunManifestStore" ]
