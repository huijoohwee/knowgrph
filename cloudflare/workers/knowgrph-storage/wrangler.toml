name = "knowgrph-storage"
main = "index.ts"
compatibility_date = "2026-05-07"
workers_dev = true

[observability]
enabled = true

[[routes]]
pattern = "airvio.co/api/storage/*"
zone_name = "airvio.co"

[[d1_databases]]
binding = "DB"
database_name = "knowgrph-storage"
database_id = "633355bf-1a52-4085-bd3c-eba4220ff152"
migrations_dir = "../../d1/migrations"

[[r2_buckets]]
binding = "KNOWGRPH_STORAGE_BLOB_BUCKET"
bucket_name = "knowgrph-storage-blobs"

# Optional operator-owned KV binding for generated-media access URL cache.
# Bind a real namespace as KNOWGRPH_MEDIA_ACCESS_KV before Cloudflare deployment.

[[durable_objects.bindings]]
name = "KNOWGRPH_CANVAS_ROOM"
class_name = "KnowgrphCanvasSyncRoom"

[[migrations]]
tag = "v1_knowgrph_canvas_sync_room"
new_sqlite_classes = [ "KnowgrphCanvasSyncRoom" ]
